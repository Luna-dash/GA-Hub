# Auto-build macOS .dmg and Windows setup.exe and attach them to a GitHub
# Release whenever a tag like `v0.2.0` is pushed.
#
# Manually re-run for an existing tag:  Actions tab → Release → Run workflow
# Triggering a fresh release:           git tag v<x.y.z> && git push origin v<x.y.z>

name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow rebuilding without a new tag (uploads artifacts only, no Release).
  workflow_dispatch:

permissions:
  contents: write   # required to create / upload to Releases

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is currently arm64 (M-series). For broader Intel-Mac
          # compatibility, swap to macos-13 — Rosetta 2 lets the resulting
          # x86_64 .app run on both arches, at the cost of slower startup
          # on Apple Silicon.
          - os: macos-latest
            artifact: build/GA-Hub-*.dmg
            asset_name: GA-Hub-macOS.dmg
          - os: windows-latest
            artifact: build/GA-Hub-*-Setup.exe
            asset_name: GA-Hub-Windows-Setup.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install Python dependencies (mac)
        if: runner.os == 'macOS'
        # PyInstaller is fine on macOS — only the Windows build switched to
        # Nuitka (to dodge SentinelOne / Defender bootloader heuristics).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install --upgrade "pyinstaller>=6.0"

      - name: Install Python dependencies (win)
        if: runner.os == 'Windows'
        # Nuitka compiles to native C — much lower AV false-positive rate than
        # PyInstaller. ordered-set + zstandard speed up Nuitka's own internals.
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install --upgrade nuitka ordered-set zstandard

      # ── platform-specific installer tooling ──────────────────────
      - name: Install create-dmg (mac)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install Inno Setup (win)
        if: runner.os == 'Windows'
        run: choco install innosetup -y --no-progress

      - name: Add ChineseSimplified.isl to Inno Setup (win)
        # Inno Setup's bundled Languages\ folder doesn't include Chinese
        # Simplified; we ship our own fetch from jrsoftware.org's official
        # unofficial-translations index so the [Languages] entry resolves.
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          $dst = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile $dst -UseBasicParsing
          Write-Host "Downloaded $((Get-Item $dst).Length) bytes to $dst"

      - name: Cache Nuitka build (win)
        # Nuitka caches its C output under %LOCALAPPDATA%\Nuitka\Nuitka\Cache.
        # On a cold cache the C compile takes 10-15 min; with cache hit it
        # drops to ~3 min. Key on the entry script + pyproject + this batch
        # so any dep change invalidates and any unrelated change reuses.
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-windows-${{ hashFiles('pyproject.toml', 'launch_webui.pyw', 'build/build_win.bat') }}
          restore-keys: |
            nuitka-windows-

      # ── build ───────────────────────────────────────────────────
      - name: Build (mac)
        if: runner.os == 'macOS'
        run: bash build/build_mac.sh

      - name: Build (win)
        if: runner.os == 'Windows'
        shell: cmd
        run: build\build_win.bat

      # ── collect artifact ────────────────────────────────────────
      # Rename to a stable filename so the release page is predictable
      # (the tag in the source name moves with each tag).
      - name: Collect artifact (mac)
        if: runner.os == 'macOS'
        run: |
          mkdir -p out
          cp build/GA-Hub-*.dmg "out/${{ matrix.asset_name }}"

      - name: Collect artifact (win)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p out
          cp build/GA-Hub-*-Setup.exe "out/${{ matrix.asset_name }}"

      - name: VirusTotal scan (win)
        # Uploads the freshly built setup.exe to VirusTotal and prints the
        # public scan URL into the workflow log. Lets us watch which engines
        # (still) flag the Nuitka-built binary so we can respond fast if the
        # ratio creeps back up. Requires the VT_API_KEY repo secret — get
        # one free at https://www.virustotal.com/gui/my-apikey. Step is
        # gracefully skipped if the secret isn't set, so forks don't break.
        if: runner.os == 'Windows' && env.VT_API_KEY != ''
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            out/${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: out/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' \) -exec cp {} release/ \;
          ls -la release

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 安装

            - **macOS**: 下载 `.dmg` → 双击 → 拖到 Applications。第一次启动**右键 → 打开**（Gatekeeper 拦截绕过，仅一次）。
            - **Windows**: 下载 `-Setup.exe` → 双击。SmartScreen 警告：**更多信息 → 仍要运行**。

            首次启动会让你选 GenericAgent 项目目录（`agentmain.py` 所在那个）。
